name: Build & deploy the Docker image

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - .github/workflows/deploy.yml
      - Dockerfile
      - Cargo.*
      - src/**

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nonk123/waste-it-bot

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build the Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy the Docker image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Redeploy Portainer stack
        uses: nonk123/redeploy-portainer-stack@master
        with:
          url: ${{ secrets.PORTAINER_URL }}
          username: ${{ secrets.PORTAINER_USERNAME }}
          password: ${{ secrets.PORTAINER_PASSWORD }}
          stack_id: ${{ secrets.PORTAINER_STACK_ID }}
          endpoint_id: ${{ secrets.PORTAINER_ENDPOINT_ID }}
